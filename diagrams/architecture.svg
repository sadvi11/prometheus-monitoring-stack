<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="820" height="420" fill="#0d1117"/>
  <text x="410" y="42" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="bold">Monitoring Stack - Architecture</text>
  <text x="410" y="66" text-anchor="middle" fill="#8b949e" font-size="13">Prometheus pull model - Docker Compose</text>
  <rect x="40" y="120" width="200" height="150" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="140" y="150" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Host</text>
  <rect x="65" y="170" width="150" height="70" rx="8" fill="#1f6feb22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="140" y="200" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">Node Exporter</text>
  <text x="140" y="222" text-anchor="middle" fill="#8b949e" font-size="11">CPU - Memory - Disk</text>
  <text x="140" y="258" text-anchor="middle" fill="#8b949e" font-size="11">:9100</text>
  <rect x="320" y="120" width="200" height="150" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="420" y="150" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Prometheus</text>
  <circle cx="420" cy="200" r="34" fill="#e6522c22" stroke="#e6522c" stroke-width="2"/>
  <text x="420" y="205" text-anchor="middle" fill="#ff7b52" font-size="13" font-weight="bold">scrape</text>
  <text x="420" y="258" text-anchor="middle" fill="#8b949e" font-size="11">stores time-series - :9090</text>
  <rect x="600" y="120" width="180" height="150" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="690" y="150" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold">Grafana</text>
  <rect x="625" y="170" width="130" height="55" rx="6" fill="#f2a60022" stroke="#f2a600" stroke-width="1.5"/>
  <text x="690" y="195" text-anchor="middle" fill="#f2c04a" font-size="13" font-weight="bold">Dashboards</text>
  <text x="690" y="213" text-anchor="middle" fill="#8b949e" font-size="10">CPU - Memory</text>
  <text x="690" y="258" text-anchor="middle" fill="#8b949e" font-size="11">PromQL - :3000</text>
  <line x1="240" y1="195" x2="315" y2="195" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="277" y="185" text-anchor="middle" fill="#8b949e" font-size="10">pull /metrics</text>
  <text x="277" y="212" text-anchor="middle" fill="#6e7681" font-size="9">every 15s</text>
  <line x1="520" y1="195" x2="595" y2="195" stroke="#f2a600" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="557" y="185" text-anchor="middle" fill="#8b949e" font-size="10">query</text>
  <rect x="600" y="310" width="180" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="690" y="337" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="bold">You</text>
  <text x="690" y="357" text-anchor="middle" fill="#8b949e" font-size="11">view live dashboards</text>
  <line x1="690" y1="270" x2="690" y2="305" stroke="#30363d" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f2a600"/></marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#30363d"/></marker>
  </defs>
